<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SmarTools</title>
  <style>
    body { margin:0; font-family:'Roboto',sans-serif; }
    .container { display:flex; height:100vh; }
    .left { flex:1; padding:20px; display:flex; flex-direction:column; justify-content:center; align-items:center; border-right:2px solid #ccc; }
    .right { flex:1; background-color:#f9f9f9; overflow-y:auto; padding:20px; }
    .sms-log { padding:10px; margin-bottom:10px; border-radius:6px; text-align:center; background-color:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.15); }
    .btn-send { background-color:#0e8652; color:#000; border:none; border-radius:6px; padding:10px 20px; font-size:16px; font-weight:bold; cursor:pointer; transition:all 0.3s ease; }
    .btn-send:hover { background-color:#0d9c61; transform:scale(1.05); box-shadow:0 4px 10px rgba(0,0,0,0.2); }
    .btn-clear { margin-top:20px; background-color:#d9534f; color:white; border:none; padding:10px 15px; cursor:pointer; border-radius:6px; }
    .btn-clear:hover { background-color:#b93232; transform:scale(1.05); box-shadow:0 4px 10px rgba(0,0,0,0.2); }
    input, textarea {
      border:none;          
      border-radius:10px;   
      padding:10px;
      outline:none;
      font-family:inherit;
      background-color:#f1f1f1;
    }
    textarea { resize:vertical; }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h2>Envio de SMS</h2>

      <label for="destinoInput">Número de destino:</label><br>
      <input type="text" id="destinoInput" placeholder="Ex: 5511999999999"><br><br>

      <label for="mensagemInput">Mensagem:</label><br>
      <textarea id="mensagemInput" rows="4" cols="40" placeholder="Digite sua mensagem aqui..."></textarea><br><br>

      <button class="btn-send" onclick="enviar()">Enviar SMS</button>

      <!-- Sessão limpa, sem número conectado, status ou ID -->
      <div id="sessao" style="display:none;"></div>

      <button class="btn-clear" onclick="novoEnvio()">Novo envio</button>
    </div>

    <div class="right" id="historico">
      <h3>Histórico de SMS enviados</h3>
    </div>
  </div>

  <script>
    let ultimoIdMensagem = null;

    async function enviar() {
      const numeroDestino = document.getElementById("destinoInput").value;
      const mensagem = document.getElementById("mensagemInput").value;

      if (numeroDestino && mensagem) {
        try {
          const response = await fetch("https://api.smsdev.com.br/v1/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify([
              {
                key: "JRWWCRDJ1MUIL53J2XP21ZL0MCYVDMPKYMHY4S6J9J8Y18Q9I5E9PDE53URPE2309CGQXA3CHY037B94IC43Z4Q2H8OJVAJJWPPZITL03FCXOOAM7WTD6T3QL49TLNVD",   // seu token da SMS Dev
                type: 9,                 // tipo de envio (9 = SMS MT)
                number: numeroDestino,   // número de destino
                msg: mensagem            // texto da mensagem
              }
            ])
          });

          const data = await response.json();

          if (Array.isArray(data) && data.length > 0 && data[0].situacao === "OK") {
            ultimoIdMensagem = data[0].id;

            const historico = document.getElementById("historico");
            const log = document.createElement("div");
            log.className = "sms-log";
            log.id = "log-" + ultimoIdMensagem;

            const agora = new Date().toLocaleString("pt-BR");
            log.innerHTML = `<strong>Mensagem:</strong> ${mensagem}<br>
                             <strong>Número:</strong> ${numeroDestino}<br>
                             <strong>Data/Hora:</strong> ${agora}<br>`;
            historico.appendChild(log);

            setTimeout(() => verificarStatus(ultimoIdMensagem), 5000);
          } else {
            adicionarLog("Erro ao enviar SMS: " + (data[0]?.descricao || "verifique sua conta"));
          }
        } catch (error) {
          adicionarLog("Falha na requisição: " + error.message);
        }
      } else {
        adicionarLog("Preencha o número de destino e a mensagem.");
      }
    }

    async function verificarStatus(idMensagem) {
      try {
        const response = await fetch(`https://api.smsdev.com.br/v1/report/${idMensagem}`, {
          method: "GET",
          headers: { "Authorization": "Bearer JRWWCRDJ1MUIL53J2XP21ZL0MCYVDMPKYMHY4S6J9J8Y18Q9I5E9PDE53URPE2309CGQXA3CHY037B94IC43Z4Q2H8OJVAJJWPPZITL03FCXOOAM7WTD6T3QL49TLNVD" }
        });

        const text = await response.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          const log = document.getElementById("log-" + idMensagem);
          log.innerHTML += `<br><strong>Relatório:</strong> Resposta inválida da API (${text.substring(0,50)}...)`;
          return;
        }

        if (Array.isArray(data) && data.length > 0) {
          const resultado = data[0];
          const log = document.getElementById("log-" + idMensagem);

          if (resultado.situacao === "OK") {
            log.innerHTML += `<br><strong>Relatório:</strong> <span style="color:green;">✔ Entregue</span>`;
          } else {
            log.innerHTML += `<br><strong>Relatório:</strong> <span style="color:red;">✖ Rejeitado - ${resultado.descricao}</span>`;
          }
        }
      } catch (error) {
        const log = document.getElementById("log-" + idMensagem);
        log.innerHTML += `<br><strong>Relatório:</strong> Erro ao consultar status (${error.message})`;
      }
    }

    function adicionarLog(texto) {
      const historico = document.getElementById("historico");
      const log = document.createElement("div");
      log.className = "sms-log";
      log.innerHTML = `<strong>${texto}</strong>`;
      historico.appendChild(log);
    }

    function novoEnvio() {
      document.getElementById("historico").innerHTML = "<h3>Histórico de SMS enviados</h3>";
      document.getElementById("destinoInput").value = "";
      document.getElementById("mensagemInput").value = "";
      document.getElementById("sessao").style.display = "none";
      ultimoIdMensagem = null;
    }
  </script>
</body>
</html>
