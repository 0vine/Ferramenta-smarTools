<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>SmarTools</title>
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
    }

    /* Tela de loading */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #0e8652;
      font-size: 20px;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading img {
      max-width: 250px;
      margin-bottom: 20px;
    }

    .spinner {
      border: 8px solid rgba(14, 134, 82, 0.3);
      border-top: 8px solid #0e8652;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .container {
      display: none;
      height: 100vh;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .container.visible {
      display: flex;
      opacity: 1;
    }

    .left {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-right: 2px solid #ccc;
    }

    .right {
      flex: 1;
      background-color: #f9f9f9;
      overflow-y: auto;
      padding: 20px;
    }

    .sms-log {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      text-align: center;
      background-color: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .sms-time {
      font-size: 12px;
      color: #777;
      margin-top: 5px;
      display: block;
    }

    .btn-send,
    .btn-clear,
    .btn-info {
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-send {
      background-color: #0e8652;
      color: #000;
    }

    .btn-send:hover {
      background-color: #0d9c61;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .btn-clear {
      background-color: #d9534f;
      color: white;
    }

    .btn-clear:hover {
      background-color: #b93232;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .btn-info {
      background-color: #007bff;
      color: white;
    }

    .btn-info:hover {
      background-color: #0056b3;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    input,
    textarea {
      border: none;
      border-radius: 10px;
      padding: 10px;
      outline: none;
      font-family: inherit;
      background-color: #f1f1f1;
    }

    textarea {
      resize: vertical;
    }

    /* Estilo do pop-up */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .popup {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .popup h3 {
      margin-top: 0;
      color: #0e8652;
    }

    .popup button {
      margin-top: 15px;
      background-color: #0e8652;
      color: #fff;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    .popup button:hover {
      background-color: #0d9c61;
    }

    .status-dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-left: 8px;
}

.status-queued { background-color: yellow; }
.status-sent { background-color: blue; }
.status-delivered { background-color: green; }
.status-failed, .status-undelivered { background-color: red; }

  </style>
</head>

<body>
  <!-- Tela de loading -->
  <div id="loading">
    <img src="assets/logo-smart.jpg" alt="Logo SMART">
    <div class="spinner"></div>
    <p>Carregando...</p>
  </div>

  <!-- Conteúdo principal -->
  <div class="container" id="app">
    <div class="left">
      <h2>Envio de SMS</h2>
      <label for="destinoInput">Número de destino:</label><br>
      <input type="text" id="destinoInput" placeholder="Ex: 5511999999999"><br><br>
      <label for="mensagemInput">Mensagem:</label><br>
      <textarea id="mensagemInput" rows="4" cols="40" placeholder="Digite sua mensagem aqui..."></textarea><br><br>
      <button class="btn-send" onclick="enviar()">Enviar SMS</button>
      <div id="sessao" style="display:none;"></div>
      <button class="btn-clear" onclick="novoEnvio()">Novo envio</button>
      <button class="btn-info" onclick="abrirPopup()">APN</button>
    </div>
    <div class="right" id="historico">
      <h3>Histórico de SMS enviados</h3>
    </div>
  </div>

  <!-- Pop-up -->
  <div class="popup-overlay" id="popupOverlay" onclick="fecharPopup(event)">
    <div class="popup">
      <h3>APN's</h3>
      <ul>
        <li>APN: claro.com.br</li>
        <li>APN: algar.br</li>
        <li>APN: tim.br</li>
      </ul>



      <button onclick="fecharPopup()">Fechar</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>

    function atualizarPagina() {
      location.reload();
    }
    // Loading inicial com fade-out
    window.addEventListener("load", () => {
      const loading = document.getElementById("loading");
      const app = document.getElementById("app");

      setTimeout(() => {
        loading.classList.add("fade-out");
        app.classList.add("visible");
      }, 2000);
    });

    let ultimoIdMensagem = null;

    const socket = io("http://localhost:4000");

     async function enviar() {
    const numeroDestino = document.getElementById("destinoInput").value.trim();
    const mensagem = document.getElementById("mensagemInput").value.trim();

    if (numeroDestino && mensagem) {
      try {
        const response = await fetch("http://localhost:4000/send-sms", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to: numeroDestino, message: mensagem })
        });

        const data = await response.json();

        if (data.success) {
          adicionarLog(data.to, data.body, data.sid, "queued");
        } else {
          adicionarLog("Erro", data.error);
        }
      } catch (error) {
        adicionarLog("Erro", "Falha na requisição: " + error.message);
      }
    } else {
      adicionarLog("Erro", "Preencha o número de destino e a mensagem.");
    }
  }

  function adicionarLog(numero, mensagem, idMensagem = null, status = "enviado") {
    const historico = document.getElementById("historico");
    const log = document.createElement("div");
    log.className = "sms-log";
    if (idMensagem) log.id = "log-" + idMensagem;

    const agora = new Date().toLocaleTimeString("pt-BR", { hour: '2-digit', minute: '2-digit' });
    log.innerHTML = `
      <strong>Número: ${numero} | Mensagem: ${mensagem}</strong>
      <span class="sms-time">Enviado às ${agora}</span>
      <span class="status-dot status-${status}"></span>
    `;
    historico.appendChild(log);
  }

  // Atualiza status em tempo real via WebSocket
  socket.on("smsStatusUpdate", (data) => {
    const log = document.getElementById("log-" + data.sid);
    if (log) {
      const dot = log.querySelector(".status-dot");
      dot.className = `status-dot status-${data.status}`;
    }
  });


    function novoEnvio() {
      document.getElementById("historico").innerHTML = "<h3>Histórico de SMS enviados</h3>";
      document.getElementById("destinoInput").value = "";
      document.getElementById("mensagemInput").value = "";
      document.getElementById("sessao").style.display = "none";
      ultimoIdMensagem = null;
    }

    // Funções do pop-up
    function abrirPopup() {
      document.getElementById("popupOverlay").style.display = "flex";
    }

    function fecharPopup(event) {
      const overlay = document.getElementById("popupOverlay");
      // Fecha se clicar no fundo ou no botão
      if (!event || event.target === overlay) {
        overlay.style.display = "none";
      }
    }

    document.getElementById("destinoInput").addEventListener("focus", function() {
  if (!this.value.startsWith("+")) {
    this.value = "+" + this.value;
  }
});


  </script>
</body>

</html>
