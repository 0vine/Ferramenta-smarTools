<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>SmarTools</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Tela de loading -->
  <div id="loading">
    <img src="assets/logo-smart.jpg" alt="Logo SMART">
    <div class="spinner"></div>
    <p>Carregando...</p>
  </div>

  <!-- Conteúdo principal -->
  <div class="container" id="app">
    <div class="left">
      <h2>Envio de SMS</h2>
      <label for="destinoInput">Número de destino:</label><br>
      <input type="text" id="destinoInput" placeholder="Ex: 5511999999999"><br><br>
      <label for="mensagemInput">Mensagem:</label><br>
      <textarea id="mensagemInput" rows="4" cols="40" placeholder="Digite sua mensagem aqui..."></textarea><br><br>
      <button class="btn-send" onclick="enviar()">Enviar SMS</button>
      <div id="sessao" style="display:none;"></div>
      <button class="btn-clear" onclick="novoEnvio()">Novo envio</button>
      <button class="btn-info" onclick="abrirPopup()">APN</button>
    </div>
    <div class="right" id="historico">
      <h3>Histórico de SMS enviados</h3>
    </div>
  </div>

  <!-- Pop-up -->
  <div class="popup-overlay" id="popupOverlay" onclick="fecharPopup(event)">
  <div class="popup">
    <h3>APN's</h3>
    <ul class="apn-list">
      <li>
        VIVO: ss.vivo.com.br
        <span class="icon-copy" onclick="copiarTexto('APN,ss.vivo.com.br,vivo,vivo#')">&#128203;</span>
      </li>
      <li>
        ALGAR: algar.br
        <span class="icon-copy" onclick="copiarTexto('APN,ss.algar.br,algar,algar#')">&#128203;</span>
      </li>
      <li>
        TIM: tim.br
        <span class="icon-copy" onclick="copiarTexto('APN,ss.tim.br,tim,tim#')">&#128203;</span>
      </li>
      <li>
        CLARO: claro.br
        <span class="icon-copy" onclick="copiarTexto('APN,ss.claro.com.br,claro,claro#')">&#128203;</span>
      </li>
    </ul>
    <button class="btn-close" onclick="fecharPopup()">Fechar</button>
  </div>
</div>


  <div id="toast"></div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script src="Javscript/script/script.js"></script>
</body>

</html>
